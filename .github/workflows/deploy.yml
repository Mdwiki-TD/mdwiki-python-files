name: Update Toolforge new

on:
    push:
        branches:
            - main

concurrency:
  group: toolforge-deploy
  cancel-in-progress: false

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Test workspace
              run: |
                  echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"

            - name: Copy files to server
              uses: appleboy/scp-action@v1.0.0
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  key: ${{ secrets.KEY }}
                  port: 22
                  source: "./"
                  target: "~/pybot_repo_tmp"
                  rm: true

            - name: Deploy Stage 1 (Update pybot core)
              uses: appleboy/ssh-action@v1.2.4
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  port: 22
                  request_pty: true
                  script_stop: true
                  key: ${{ secrets.KEY }}
                  script: |
                      # Define the full source path of the uploaded repository
                      FULL_PATH="/home/${{ secrets.USERNAME }}/pybot_repo_tmp"

                      echo ">>> Fixing Windows line endings (CRLF to LF) for all shell scripts..."
                      # Run sed on all .sh files in the uploaded directory to fix compatibility issues
                      find "$FULL_PATH" -type f -name "*.sh" -exec sed -i 's/\r$//' {} +

                      # Execute Stage 1: Update pybot core repository
                      chmod +x "$FULL_PATH/toolforge/deploy_pybot_repo.sh"
                      bash "$FULL_PATH/toolforge/deploy_pybot_repo.sh" "$FULL_PATH"

            - name: Deploy Stage 2 (Deploy YAML jobs & Cleanup)
              uses: appleboy/ssh-action@v1.2.4
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  port: 22
                  request_pty: true
                  script_stop: true
                  key: ${{ secrets.KEY }}
                  script: |
                      # Define the full source path of the uploaded repository
                      FULL_PATH="/home/${{ secrets.USERNAME }}/pybot_repo_tmp"

                      # Execute Stage 2: Deploy YAML jobs for all tools
                      chmod +x "$FULL_PATH/toolforge/deploy_tools.sh"
                      bash "$FULL_PATH/toolforge/deploy_tools.sh" "$FULL_PATH/toolforge"

                      # Clean up the temporary repository directory safely
                      rm -rf "$FULL_PATH"
